    seasonal: false
    price_elasticity: -0.9
  pawmedica:
    margin_floor: 0.25
    seasonal: false
    price_elasticity: -0.8
  ruckus:
    margin_floor: 0.22
    seasonal: false
    price_elasticity: -0.8
  pure_velvet:
    margin_floor: 0.22
    seasonal: false
    price_elasticity: -0.8
  pureauty_naturals:
    margin_floor: 0.25
    seasonal: false
    price_elasticity: -1.0
  visivite:
    margin_floor: 0.25
    seasonal: false
    price_elasticity: -0.7
  nl_brands_other:
    margin_floor: 0.25
    seasonal: false
    price_elasticity: -0.8

brand_name_mapping:
  "Mav Aquadoc": "aquadoc"
  "AquaDoc": "aquadoc"
  "Aquadoc": "aquadoc"
  "Pawmedica": "pawmedica"
  "PawMedica": "pawmedica"
  "Pawmedica Ruckus Pure Velve": "nl_brands"
  "PawMedica Ruckus Pure Velve": "nl_brands"
  "NL Brands (PawMedica)": "nl_brands"
  "NL Brands (Pawmedica)": "nl_brands"
  "VisiVite": "visivite"
  "Visivite": "visivite"
  "Ruckus | CAD": "ruckus"
  "Ruckus": "ruckus"
  "Pure Velvet": "pure_velvet"
  "Pureauty Naturals": "pureauty_naturals"
  "Mokita Naturals": "mokita_naturals"

signals:
  weights:
    ctr: 0.10          # was 0.15; reduced by 0.05 to accommodate bsr signal
    conversion: 0.20
    velocity: 0.20
    margin: 0.15
    trend: 0.15
    refund_rate: 0.05
    inventory_pressure: 0.05
    yoy_factor: 0.05
    bsr: 0.05           # Helium10 keyword avg rank trend (organic visibility)
  min_weekly_units: 3   # Below this → force HOLD + confidence "Insufficient Data" (too few sales for reliable signal)
  thresholds:
    raise_score: 0.25
    lower_score: -0.25
    ctr_raise_factor: 1.15
    ctr_lower_factor: 0.85
    cr_raise_pct: 0.10
    cr_lower_pct: -0.10
    velocity_raise_pct: 0.08
    velocity_lower_pct: -0.08
    margin_comfortable_cushion: 0.15
    margin_tight_cushion: 0.05
    refund_rate_threshold: 0.05
    low_dos_days: 14

confidence:
  high_min_signals: 3
  medium_min_signals: 2
  min_data_completeness: 0.60

price_scenarios:
  raise_pcts: [0.05, 0.10]
  lower_pcts: [0.05, 0.10]
  default_elasticity: -0.8

analysis_window_days: 30
prior_window_days: 30
yoy_window_days: 30   # Same-week-last-year window (365 days back). Uses Sellerise historical data already loaded.
                      # Seasonal brands (aquadoc) use this to adjust velocity signal — a velocity drop in off-peak
                      # is expected and suppressed. YoY factor = current_velocity / same_week_last_year_velocity.
                      # If Sellerise files don't go back 365 days, yoy_factor = None and weight redistributes to velocity.
                      # Future: add Drive folder lookup for historical files when local data is insufficient.
lookback_period_days: 28  # ~4 weeks — how long after team actions a recommendation before engine checks the effect.
                           # Engine reads 'Pipeline Actions' tab (populated by email form) to know when action was taken.

